<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Admin — Gerenciar Lojistas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    :root {
        --bg: #0f0f14;
        --surface: #1a1a24;
        --surface2: #22222f;
        --border: rgba(255,255,255,0.07);
        --accent: #029ad5;
        --accent-dim: rgba(2,154,213,0.15);
        --danger: #e05252;
        --danger-dim: rgba(224,82,82,0.12);
        --text: #f0f0f5;
        --text-muted: #888899;
        --success: #3ecf8e;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        margin: 0;
        padding: 0 0 2rem;
    }

    /* ---- Topbar ---- */
    .topbar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 1rem 1.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
    }
    .topbar-title {
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .topbar-title span { color: var(--accent); }

    /* ---- Botão novo lojista ---- */
    .btn-new {
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 10px;
        padding: 0.5rem 1rem;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        transition: opacity 0.15s, transform 0.1s;
        font-family: inherit;
    }
    .btn-new:active { opacity: 0.85; transform: scale(0.97); }

    /* ---- Lista de lojistas ---- */
    .stores-list {
        padding: 1rem 1rem 0;
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
    }

    .store-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1rem 1.1rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        animation: cardIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .store-avatar {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: var(--accent-dim);
        color: var(--accent);
        font-size: 1.1rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        text-transform: uppercase;
    }

    .store-info { flex: 1; min-width: 0; }
    .store-name {
        font-size: 0.95rem;
        font-weight: 600;
        margin: 0 0 0.15rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .store-meta {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin: 0;
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
    }
    .store-meta span { display: flex; align-items: center; gap: 0.25rem; }

    .store-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .btn-icon {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text-muted);
        font-size: 0.95rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, color 0.15s;
        font-family: inherit;
    }
    .btn-icon:hover { background: var(--accent-dim); color: var(--accent); }
    .btn-icon.danger:hover { background: var(--danger-dim); color: var(--danger); }
    .btn-icon:active { transform: scale(0.93); }

    /* ---- Estado vazio ---- */
    .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-muted);
    }
    .empty-state i { font-size: 2.5rem; margin-bottom: 0.75rem; display: block; color: var(--surface2); }

    /* ---- Loading ---- */
    .loading {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    /* ---- Modal / Drawer ---- */
    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        z-index: 200;
        display: none;
        align-items: flex-end;
        justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .drawer {
        background: var(--surface);
        border-radius: 20px 20px 0 0;
        width: 100%;
        max-width: 560px;
        padding: 1.25rem 1.25rem 2rem;
        border-top: 1px solid var(--border);
        animation: drawerUp 0.38s cubic-bezier(0.22,1,0.36,1) both;
        max-height: 92dvh;
        overflow-y: auto;
    }
    @keyframes drawerUp {
        from { transform: translateY(100%); opacity: 0; }
        to   { transform: translateY(0); opacity: 1; }
    }

    .drawer-handle {
        width: 36px; height: 4px;
        background: var(--border);
        border-radius: 999px;
        margin: 0 auto 1.25rem;
    }

    .drawer-title {
        font-size: 1.05rem;
        font-weight: 700;
        margin: 0 0 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .drawer-title i { color: var(--accent); }

    /* ---- Form fields ---- */
    .field { margin-bottom: 1rem; }
    .field label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.4rem;
    }
    .field input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-family: inherit;
        font-size: 0.95rem;
        padding: 0.65rem 0.85rem;
        outline: none;
        transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--text-muted); }
    .field .hint {
        font-size: 0.72rem;
        color: var(--text-muted);
        margin-top: 0.3rem;
    }

    /* ---- Botões do form ---- */
    .form-actions { display: flex; gap: 0.65rem; margin-top: 1.25rem; }
    .btn-cancel {
        flex: 1;
        padding: 0.7rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text-muted);
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
    }
    .btn-cancel:hover { background: var(--surface); }
    .btn-save {
        flex: 2;
        padding: 0.7rem;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: white;
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.15s;
    }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-save:active:not(:disabled) { opacity: 0.85; }

    /* ---- Toast ---- */
    .toast-stack {
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        align-items: center;
        pointer-events: none;
    }
    .toast-msg {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 999px;
        padding: 0.55rem 1.1rem;
        font-size: 0.85rem;
        font-weight: 500;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        animation: toastIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
        white-space: nowrap;
    }
    .toast-msg.success { border-color: var(--success); color: var(--success); }
    .toast-msg.error   { border-color: var(--danger);  color: var(--danger);  }
    @keyframes toastIn {
        from { opacity: 0; transform: translateY(12px) scale(0.92); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ---- Modal de confirmação ---- */
    .confirm-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.75);
        backdrop-filter: blur(4px);
        z-index: 300;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 1.5rem;
        max-width: 340px;
        width: 100%;
        text-align: center;
        animation: cardIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }
    .confirm-box i { font-size: 2.2rem; color: var(--danger); margin-bottom: 0.75rem; display: block; }
    .confirm-box h3 { font-size: 1rem; font-weight: 700; margin: 0 0 0.4rem; }
    .confirm-box p  { font-size: 0.85rem; color: var(--text-muted); margin: 0 0 1.25rem; }
    .confirm-actions { display: flex; gap: 0.65rem; }
    .btn-confirm-cancel {
        flex: 1; padding: 0.65rem; border-radius: 10px;
        border: 1px solid var(--border); background: var(--surface2);
        color: var(--text-muted); font-family: inherit; font-size: 0.9rem;
        font-weight: 600; cursor: pointer;
    }
    .btn-confirm-delete {
        flex: 1; padding: 0.65rem; border-radius: 10px;
        border: none; background: var(--danger);
        color: white; font-family: inherit; font-size: 0.9rem;
        font-weight: 700; cursor: pointer;
    }
    .btn-confirm-delete:active { opacity: 0.85; }

    /* ---- Tag PIX ---- */
    .tag-pix {
        display: inline-flex;
        align-items: center;
        gap: 0.2rem;
        font-size: 0.7rem;
        background: rgba(62,207,142,0.1);
        color: var(--success);
        border-radius: 5px;
        padding: 0.1rem 0.4rem;
    }
    .tag-no-pix {
        font-size: 0.7rem;
        color: var(--text-muted);
    }

    /* ID badge */
    .id-badge {
        font-size: 0.68rem;
        background: var(--surface2);
        color: var(--text-muted);
        border-radius: 5px;
        padding: 0.1rem 0.35rem;
        font-weight: 600;
    }
</style>

<body>

<!-- Topbar -->
<div class="topbar">
    <h1 class="topbar-title"><i class="bi bi-shield-lock-fill"></i> Admin <span>Lojistas</span></h1>
    <button class="btn-new" onclick="openDrawer()">
        <i class="bi bi-plus-lg"></i> Novo
    </button>
</div>

<!-- Lista -->
<div class="stores-list" id="storesList">
    <div class="loading"><i class="bi bi-arrow-repeat"></i> Carregando lojistas...</div>
</div>

<!-- Toast stack -->
<div class="toast-stack" id="toastStack"></div>

<!-- Drawer: criar / editar -->
<div class="modal-overlay" id="drawerOverlay" onclick="handleOverlayClick(event)">
    <div class="drawer" id="drawer">
        <div class="drawer-handle"></div>
        <h2 class="drawer-title" id="drawerTitle"><i class="bi bi-shop"></i> Novo Lojista</h2>

        <div class="field">
            <label>Nome da Loja *</label>
            <input type="text" id="fieldName" placeholder="Ex: Mercado da Esquina" autocomplete="off">
        </div>
        <div class="field">
            <label>Chave PIX</label>
            <input type="text" id="fieldPix" placeholder="CPF, e-mail, telefone ou aleatória" autocomplete="off">
            <p class="hint">Deixe em branco se não for usar pagamento PIX.</p>
        </div>
        <div class="field">
            <label>Login *</label>
            <input type="text" id="fieldLogin" placeholder="Usuário de acesso" autocomplete="off">
        </div>
        <div class="field" id="senhaField">
            <label id="senhaLabel">Senha *</label>
            <input type="password" id="fieldSenha" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
            <p class="hint" id="senhaHint"></p>
        </div>

        <div class="form-actions">
            <button class="btn-cancel" onclick="closeDrawer()">Cancelar</button>
            <button class="btn-save" id="btnSave" onclick="saveStore()">
                <span id="btnSaveText">Criar Lojista</span>
            </button>
        </div>
    </div>
</div>

<!-- Modal de confirmação de exclusão -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <h3>Remover Lojista?</h3>
        <p id="confirmText">Esta ação não pode ser desfeita.</p>
        <div class="confirm-actions">
            <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancelar</button>
            <button class="btn-confirm-delete" id="btnConfirmDelete">Remover</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let stores = [];
    let editingId = null;

    // ---- API ----
    const api = {
        get:    ()         => fetch('/api/admin/stores').then(r => r.json()),
        create: (data)     => fetch('/api/admin/stores', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) }),
        update: (id, data) => fetch(`/api/admin/stores/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) }),
        delete: (id)       => fetch(`/api/admin/stores/${id}`, { method: 'DELETE' }),
    };

    // ---- Toast ----
    function toast(msg, type = 'success') {
        const stack = document.getElementById('toastStack');
        const el = document.createElement('div');
        el.className = `toast-msg ${type}`;
        el.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle-fill' : 'x-circle-fill'}"></i> ${msg}`;
        stack.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }

    // ---- Render ----
    function render() {
        const list = document.getElementById('storesList');
        if (stores.length === 0) {
            list.innerHTML = `<div class="empty-state"><i class="bi bi-shop"></i><p>Nenhum lojista cadastrado.</p></div>`;
            return;
        }
        list.innerHTML = stores.map((s, i) => `
            <div class="store-card" style="animation-delay: ${i * 0.05}s">
                <div class="store-avatar">${s.name.charAt(0)}</div>
                <div class="store-info">
                    <p class="store-name">${s.name}</p>
                    <div class="store-meta">
                        <span><span class="id-badge">#${s.id}</span></span>
                        <span><i class="bi bi-person"></i> ${s.login}</span>
                        ${s.pix
            ? `<span class="tag-pix"><i class="bi bi-qr-code"></i> PIX</span>`
            : `<span class="tag-no-pix">Sem PIX</span>`}
                    </div>
                </div>
                <div class="store-actions">
                    <button class="btn-icon" title="Copiar link da loja" onclick="copyStoreUrl(${s.id})"><i class="bi bi-link-45deg"></i></button>
                    <button class="btn-icon" title="Editar" onclick="openEdit(${s.id})"><i class="bi bi-pencil"></i></button>
                    <button class="btn-icon danger" title="Remover" onclick="confirmDelete(${s.id}, '${s.name.replace(/'/g,"\\'")}')"><i class="bi bi-trash"></i></button>
                </div>
            </div>`).join('');
    }

    // ---- Copiar URL da loja ----
    function copyStoreUrl(id) {
        const url = `${window.location.origin}/${id}/`;
        navigator.clipboard.writeText(url)
            .then(() => toast('Link copiado!'))
            .catch(() => {
                // Fallback para navegadores sem clipboard API
                const ta = document.createElement('textarea');
                ta.value = url;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                toast('Link copiado!');
            });
    }

    // ---- Load ----
    async function loadStores() {
        try {
            stores = await api.get();
            render();
        } catch {
            document.getElementById('storesList').innerHTML =
                `<div class="empty-state"><i class="bi bi-wifi-off"></i><p>Erro ao carregar. Verifique a conexão.</p></div>`;
        }
    }

    // ---- Drawer ----
    function openDrawer(id = null) {
        editingId = id;
        const overlay   = document.getElementById('drawerOverlay');
        const title     = document.getElementById('drawerTitle');
        const btnText   = document.getElementById('btnSaveText');
        const senhaHint = document.getElementById('senhaHint');
        const senhaLabel = document.getElementById('senhaLabel');

        if (id) {
            const s = stores.find(x => x.id === id);
            document.getElementById('fieldName').value  = s.name  || '';
            document.getElementById('fieldPix').value   = s.pix   || '';
            document.getElementById('fieldLogin').value = s.login || '';
            document.getElementById('fieldSenha').value = '';
            title.innerHTML    = `<i class="bi bi-pencil"></i> Editar Lojista`;
            btnText.textContent = 'Salvar Alterações';
            senhaLabel.textContent = 'Nova Senha';
            senhaHint.textContent  = 'Deixe em branco para manter a senha atual.';
        } else {
            document.getElementById('fieldName').value  = '';
            document.getElementById('fieldPix').value   = '';
            document.getElementById('fieldLogin').value = '';
            document.getElementById('fieldSenha').value = '';
            title.innerHTML    = `<i class="bi bi-shop"></i> Novo Lojista`;
            btnText.textContent = 'Criar Lojista';
            senhaLabel.textContent = 'Senha *';
            senhaHint.textContent  = '';
        }

        overlay.classList.add('open');
        setTimeout(() => document.getElementById('fieldName').focus(), 300);
    }

    function openEdit(id) { openDrawer(id); }

    function closeDrawer() {
        document.getElementById('drawerOverlay').classList.remove('open');
        editingId = null;
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('drawerOverlay')) closeDrawer();
    }

    // ---- Save ----
    async function saveStore() {
        const name  = document.getElementById('fieldName').value.trim();
        const pix   = document.getElementById('fieldPix').value.trim();
        const login = document.getElementById('fieldLogin').value.trim();
        const senha = document.getElementById('fieldSenha').value.trim();

        if (!name)  { toast('Nome é obrigatório.', 'error'); return; }
        if (!login) { toast('Login é obrigatório.', 'error'); return; }
        if (!editingId && !senha) { toast('Senha é obrigatória para novo lojista.', 'error'); return; }

        const btn = document.getElementById('btnSave');
        btn.disabled = true;

        try {
            const payload = { name, pix: pix || null, login };
            if (senha) payload.senha = senha;

            const res = editingId
                ? await api.update(editingId, payload)
                : await api.create(payload);

            if (res.ok) {
                toast(editingId ? 'Lojista atualizado!' : 'Lojista criado!');
                closeDrawer();
                await loadStores();
            } else {
                const msg = await res.text();
                toast(msg || 'Erro ao salvar.', 'error');
            }
        } catch {
            toast('Erro de conexão.', 'error');
        } finally {
            btn.disabled = false;
        }
    }

    // ---- Delete ----
    let deletingId = null;
    function confirmDelete(id, name) {
        deletingId = id;
        document.getElementById('confirmText').textContent = `"${name}" será removido permanentemente.`;
        document.getElementById('confirmOverlay').classList.add('open');
    }
    function closeConfirm() {
        document.getElementById('confirmOverlay').classList.remove('open');
        deletingId = null;
    }
    document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
        if (!deletingId) return;
        document.getElementById('btnConfirmDelete').disabled = true;
        try {
            const res = await api.delete(deletingId);
            if (res.ok) {
                toast('Lojista removido.');
                closeConfirm();
                await loadStores();
            } else {
                toast('Erro ao remover.', 'error');
            }
        } catch {
            toast('Erro de conexão.', 'error');
        } finally {
            document.getElementById('btnConfirmDelete').disabled = false;
        }
    });

    // Enter para salvar
    document.querySelectorAll('.field input').forEach(input => {
        input.addEventListener('keypress', e => { if (e.key === 'Enter') saveStore(); });
    });

    // Init
    loadStores();
</script>
</body>
</html>
