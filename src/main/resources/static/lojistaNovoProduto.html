<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pague e Leve - Novo Produto</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <style>
        body { background-color: #029ad5; }
        .card { margin-top: 3rem; margin-bottom: 3rem; }

        /* ---- Cropper modal ---- */
        .cropper-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            z-index: 9999; display: none; align-items: flex-start; justify-content: center;
        }
        .cropper-modal-overlay.open { display: flex; }
        .cropper-box {
            width: 100%; max-width: 640px; display: flex;
            flex-direction: column; height: 100dvh; background: #111;
        }
        .cropper-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.75rem 1rem; background: #1a1a1a;
            border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
        }
        .cropper-header h2 {
            font-size: 0.95rem; font-weight: 600; color: white;
            margin: 0; display: flex; align-items: center; gap: 0.4rem;
        }
        .cropper-header h2 i { color: #029ad5; }
        .cropper-header span { font-size: 0.72rem; color: rgba(255,255,255,0.35); }
        .cropper-image-area {
            flex: 1; overflow: hidden; position: relative; background: #000; min-height: 0;
        }
        .cropper-image-area img { display: block; max-width: 100%; }
        .cropper-toolbar {
            background: #1a1a1a; border-top: 1px solid rgba(255,255,255,0.08);
            padding: 0.55rem 0.75rem; display: flex; gap: 0.4rem;
            overflow-x: auto; flex-shrink: 0; scrollbar-width: none; align-items: center;
        }
        .cropper-toolbar::-webkit-scrollbar { display: none; }
        .crop-btn {
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.65); border-radius: 8px; padding: 0.3rem 0.6rem;
            font-size: 0.78rem; font-weight: 500; cursor: pointer; white-space: nowrap;
            font-family: inherit; display: flex; align-items: center; gap: 0.3rem;
            flex-shrink: 0; min-height: 34px; min-width: 34px; justify-content: center;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .crop-btn:hover { background: rgba(2,154,213,0.2); border-color: #029ad5; color: #029ad5; }
        .crop-btn:active { transform: scale(0.94); }
        .crop-sep { width: 1px; height: 22px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
        .cropper-footer {
            display: flex; gap: 0.6rem; padding: 0.75rem 1rem;
            background: #1a1a1a; border-top: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
        }
        .btn-crop-cancel {
            flex: 1; padding: 0.7rem; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.65); font-family: inherit; font-size: 0.9rem;
            font-weight: 600; cursor: pointer; min-height: 46px;
        }
        .btn-crop-confirm {
            flex: 2; padding: 0.7rem; border-radius: 10px; border: none;
            background: #029ad5; color: white; font-family: inherit;
            font-size: 0.9rem; font-weight: 700; cursor: pointer; min-height: 46px;
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
        }
        .btn-crop-confirm:active { opacity: 0.85; }
        .img-preview-wrap {
            margin-top: 0.6rem; border-radius: 10px; overflow: hidden;
            border: 2px dashed #029ad5; position: relative;
        }
        .img-preview-wrap img { width: 100%; max-height: 180px; object-fit: cover; display: block; }
        .img-preview-label {
            position: absolute; top: 0.4rem; left: 0.4rem; background: #029ad5;
            color: white; font-size: 0.68rem; font-weight: 700;
            border-radius: 5px; padding: 0.1rem 0.45rem;
        }
        .btn-reselect {
            font-size: 0.8rem; color: #029ad5; background: none; border: none;
            cursor: pointer; padding: 0.25rem 0; font-family: inherit;
            text-decoration: underline; display: block; margin-top: 0.25rem;
        }
    </style>
</head>
<body>

<div class="container my-3">
    <a href="lojistaPagina.html" class="btn btn-light shadow-sm">
        <i class="bi bi-arrow-left-circle-fill"></i> Voltar para a Lista
    </a>
</div>

<div class="container">
    <div class="card">
        <div class="card-header"><h3>Adicionar Novo Produto</h3></div>
        <div class="card-body">
            <form id="productForm" enctype="multipart/form-data">
                <div id="formMessage" class="d-none" role="alert"></div>

                <div class="mb-3">
                    <label for="productName" class="form-label fw-bold">Nome do Produto</label>
                    <input type="text" class="form-control" id="productName" name="name" required>
                </div>

                <div class="mb-3">
                    <label for="productDescription" class="form-label fw-bold">Descrição do Produto</label>
                    <textarea class="form-control" id="productDescription" name="description" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label for="productCategory" class="form-label fw-bold">Categoria (Opcional)</label>
                    <input type="text" class="form-control awesomplete" id="productCategory" name="category" placeholder="Ex: Bebidas, Doces, etc.">
                </div>

                <div class="mb-3">
                    <label for="productPrice" class="form-label fw-bold">Preço do Produto</label>
                    <div class="input-group">
                        <span class="input-group-text">R$</span>
                        <input type="number" step="0.01" class="form-control" id="productPrice" name="price" placeholder="19.99" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="productOldPrice" class="form-label fw-bold">Preço Antigo (Opcional)</label>
                    <div class="input-group">
                        <span class="input-group-text">R$</span>
                        <input type="number" step="0.01" class="form-control" id="productOldPrice" name="oldPrice" placeholder="29.99">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="productBarcode" class="form-label fw-bold">Código de Barras (Opcional)</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="productBarcode" name="codigoDeBarras" placeholder="Digite ou escaneie o código">
                        <button class="btn btn-outline-secondary" type="button" id="start-scan-btn">
                            <i class="bi bi-upc-scan"></i>
                        </button>
                    </div>
                </div>

                <div id="scanner-ui" class="mt-3 mb-3" style="display:none;">
                    <div id="barcode-scanner-container" style="width:100%; max-width:500px; margin:auto;"></div>
                    <button id="stop-scan-btn" class="btn btn-danger mt-2" type="button">Parar Scanner</button>
                </div>

                <!-- Imagem -->
                <div class="mb-3">
                    <label class="form-label fw-bold">Imagem do Produto (Opcional)</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="imageSource" id="sourceUpload" value="upload" checked>
                        <label class="form-check-label" for="sourceUpload">Fazer Upload de Arquivo</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="imageSource" id="sourceLink" value="link">
                        <label class="form-check-label" for="sourceLink">Usar Link de Imagem</label>
                    </div>
                </div>

                <div id="uploadContainer" class="mb-3">
                    <input type="file" class="form-control" id="productImage" accept="image/*">
                    <div class="form-text">Ao selecionar, você poderá cortar e ajustar a imagem.</div>
                    <div id="imagePreviewWrap" class="img-preview-wrap d-none">
                        <span class="img-preview-label"><i class="bi bi-check-lg"></i> Pronto</span>
                        <img id="imagePreview" src="" alt="Preview">
                        <button class="btn-reselect" type="button" onclick="document.getElementById('productImage').click()">
                            <i class="bi bi-pencil-square"></i> Trocar imagem
                        </button>
                    </div>
                </div>

                <div id="linkContainer" class="mb-3 d-none">
                    <div class="input-group">
                        <input type="url" class="form-control" id="imageUrl" placeholder="https://exemplo.com/imagem.jpg" autocomplete="off">
                        <button class="btn btn-outline-secondary" type="button" id="loadUrlBtn">
                            <i class="bi bi-cloud-download"></i> Carregar
                        </button>
                    </div>
                    <div class="form-text">Cole a URL e clique em Carregar para cortar a imagem.</div>
                    <div id="urlError" class="text-danger small mt-1 d-none"></div>
                </div>

                <div class="form-check form-switch mb-4">
                    <input class="form-check-input" type="checkbox" role="switch" id="productFeatured" name="featured" value="true">
                    <label class="form-check-label" for="productFeatured">Produto de Destaque</label>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary" id="submitButton">
                        <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                        Adicionar Produto
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal Cropper -->
<div class="cropper-modal-overlay" id="cropperModal">
    <div class="cropper-box">
        <div class="cropper-header">
            <h2><i class="bi bi-crop"></i> Ajustar Imagem</h2>
            <span>Arraste para mover • Puxe as bordas para cortar</span>
        </div>
        <div class="cropper-image-area">
            <img id="cropperImage" src="" alt="">
        </div>
        <div class="cropper-toolbar">
            <button class="crop-btn" id="cropRatioFree"><i class="bi bi-aspect-ratio"></i> Livre</button>
            <button class="crop-btn" id="cropRatio1x1">1:1</button>
            <button class="crop-btn" id="cropRatio4x3">4:3</button>
            <button class="crop-btn" id="cropRatio16x9">16:9</button>
            <div class="crop-sep"></div>
            <button class="crop-btn" id="cropRotateLeft" title="Girar esquerda"><i class="bi bi-arrow-counterclockwise"></i></button>
            <button class="crop-btn" id="cropRotateRight" title="Girar direita"><i class="bi bi-arrow-clockwise"></i></button>
            <button class="crop-btn" id="cropFlipX" title="Espelhar horizontalmente"><i class="bi bi-symmetry-horizontal"></i></button>
        </div>
        <div class="cropper-footer">
            <button class="btn-crop-cancel" id="cropCancelBtn">Cancelar</button>
            <button class="btn-crop-confirm" id="cropConfirmBtn"><i class="bi bi-check-lg"></i> Usar esta imagem</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script src="/js/image-cropper.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const productForm     = document.getElementById('productForm');
        const formMessage     = document.getElementById('formMessage');
        const submitButton    = document.getElementById('submitButton');
        const spinner         = submitButton.querySelector('.spinner-border');
        const uploadContainer = document.getElementById('uploadContainer');
        const linkContainer   = document.getElementById('linkContainer');
        const fileInput       = document.getElementById('productImage');
        const urlInput        = document.getElementById('imageUrl');
        const previewWrap     = document.getElementById('imagePreviewWrap');
        const previewImg      = document.getElementById('imagePreview');

        let croppedBlob = null;
        let croppedName = null;

        // Toggle upload / link
        document.getElementById('sourceUpload').addEventListener('change', () => {
            uploadContainer.classList.remove('d-none');
            linkContainer.classList.add('d-none');
            urlInput.value = '';
        });
        document.getElementById('sourceLink').addEventListener('change', () => {
            linkContainer.classList.remove('d-none');
            uploadContainer.classList.add('d-none');
            fileInput.value = '';
            croppedBlob = null;
            previewWrap.classList.add('d-none');
        });

        // Carregar imagem por URL → abre cropper
        document.getElementById('loadUrlBtn').addEventListener('click', async () => {
            const url = document.getElementById('imageUrl').value.trim();
            const urlError = document.getElementById('urlError');
            urlError.classList.add('d-none');
            if (!url) { urlError.textContent = 'Cole uma URL válida antes de carregar.'; urlError.classList.remove('d-none'); return; }

            const btn = document.getElementById('loadUrlBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

            try {
                // Busca a imagem via proxy do próprio servidor para evitar CORS
                const res = await fetch(`/api/proxy-image?url=${encodeURIComponent(url)}`);
                if (!res.ok) throw new Error('Não foi possível carregar a imagem. Verifique a URL.');
                const blob = await res.blob();
                if (!blob.type.startsWith('image/')) throw new Error('A URL não aponta para uma imagem válida.');

                // Converte blob em File e abre o cropper
                const ext = blob.type.split('/')[1] || 'jpg';
                const file = new File([blob], `imagem-url.${ext}`, { type: blob.type });
                // Dispara o cropper manualmente
                ImageCropper.openWithFile(file, 'cropperModal');
            } catch (err) {
                urlError.textContent = err.message || 'Erro ao carregar imagem.';
                urlError.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-cloud-download"></i> Carregar';
            }
        });

        // Enter na URL também carrega
        document.getElementById('imageUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); document.getElementById('loadUrlBtn').click(); }
        });

        // Cropper
        ImageCropper.init('productImage', 'cropperModal', (blob, filename) => {
            croppedBlob = blob;
            croppedName = filename;
            previewImg.src = URL.createObjectURL(blob);
            previewWrap.classList.remove('d-none');
        });

        // Scanner
        const scannerUi    = document.getElementById('scanner-ui');
        const barcodeInput = document.getElementById('productBarcode');
        const qr = new Html5Qrcode("barcode-scanner-container");

        document.getElementById('start-scan-btn').addEventListener('click', () => {
            scannerUi.style.display = 'block';
            qr.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } },
                (text) => { barcodeInput.value = text; qr.stop().then(() => scannerUi.style.display = 'none'); },
                () => {}
            ).catch(() => { alert("Não foi possível iniciar o scanner."); scannerUi.style.display = 'none'; });
        });
        document.getElementById('stop-scan-btn').addEventListener('click', () => {
            qr.stop().then(() => scannerUi.style.display = 'none').catch(console.error);
        });

        // Categorias
        const storeId = localStorage.getItem('loggedInStoreId');
        if (!storeId) { window.location.href = '/lojistaLogin.html'; return; }

        fetch(`/api/categories/${storeId}`)
            .then(r => r.json())
            .then(data => new Awesomplete(document.getElementById('productCategory'), { list: data.map(c => c.name) }))
            .catch(console.error);

        // Submit
        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitButton.disabled = true;
            spinner.classList.remove('d-none');
            formMessage.classList.add('d-none');

            const formData = new FormData(productForm);
            formData.append('storeId', storeId);

            // Substitui arquivo pelo blob cortado
            if (croppedBlob) {
                formData.delete('imageFile');
                formData.append('imageFile', croppedBlob, croppedName || 'imagem.jpg');
            }

            try {
                const res = await fetch('/api/products', { method: 'POST', body: formData });
                const msg = await res.text();
                if (res.ok) {
                    formMessage.className = 'alert alert-success mt-3';
                    formMessage.textContent = msg;
                    productForm.reset();
                    croppedBlob = null;
                    previewWrap.classList.add('d-none');
                    uploadContainer.classList.remove('d-none');
                    linkContainer.classList.add('d-none');
                } else {
                    formMessage.className = 'alert alert-danger mt-3';
                    formMessage.textContent = `Erro: ${msg}`;
                }
            } catch {
                formMessage.className = 'alert alert-danger mt-3';
                formMessage.textContent = 'Erro de conexão. Verifique se o servidor está no ar.';
            } finally {
                submitButton.disabled = false;
                spinner.classList.add('d-none');
                formMessage.classList.remove('d-none');
            }
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
