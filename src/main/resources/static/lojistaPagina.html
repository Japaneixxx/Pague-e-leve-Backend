<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pague e Leve - Seus Produtos</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #029ad5; }
        .product-card { transition: box-shadow .3s; }
        .product-card:hover { box-shadow: 0 0 15px rgba(0,0,0,0.15); }
        .product-image { width: 100%; height: 200px; object-fit: contain; background: #f8f8f8; }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4 gap-2 flex-wrap">
        <h1 class="mb-0">Seus Produtos</h1>
        <div class="d-flex gap-2">
            <a href="/lojistaNovoProduto.html" class="btn btn-primary">
                <i class="bi bi-plus-circle-fill"></i> Adicionar Novo Produto
            </a>
            <button id="logoutBtn" class="btn btn-outline-light" title="Sair da conta">
                <i class="bi bi-box-arrow-right"></i> Sair
            </button>
        </div>
    </div>

    <div class="row mb-4 g-3 align-items-end">
        <div class="col-md-4">
            <label for="category-filter" class="form-label text-white fw-semibold">Filtrar por Categoria</label>
            <select id="category-filter" class="form-select">
                <option value="all">Todas as Categorias</option>
            </select>
        </div>
        <div class="col-md-8">
            <label for="search-input" class="form-label text-white fw-semibold">Buscar por nome</label>
            <input type="text" id="search-input" class="form-control" placeholder="Digite o nome do produto...">
        </div>
    </div>

    <div id="message-container"></div>

    <div id="product-list-container" class="row g-4">
        <div class="text-center" id="loading-spinner">
            <div class="spinner-border text-light" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
            <p class="mt-2 text-white">Carregando produtos...</p>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const productListContainer = document.getElementById('product-list-container');
        const loadingSpinner       = document.getElementById('loading-spinner');
        const categoryFilter       = document.getElementById('category-filter');
        const searchInput          = document.getElementById('search-input');
        const storeId              = localStorage.getItem('loggedInStoreId');

        let allProducts = [];

        // ---- Logout ----
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('loggedInStoreId');
            window.location.href = '/lojistaLogin.html';
        });

        // ---- Auth guard ----
        if (!storeId) {
            alert('Você não está autenticado. Redirecionando para a página de login.');
            window.location.href = '/lojistaLogin.html';
            return;
        }

        // ---- Carregar produtos ----
        try {
            const response = await fetch(`/api/stores/${storeId}/products`);
            if (!response.ok) throw new Error('Falha ao carregar produtos.');
            allProducts = await response.json();
        } catch (err) {
            loadingSpinner.innerHTML = `<p class="text-white">Erro ao carregar produtos: ${err.message}</p>`;
            return;
        }

        // ---- Carregar categorias no filtro ----
        const categories = [...new Set(allProducts.map(p => p.category?.name).filter(Boolean))];
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            categoryFilter.appendChild(opt);
        });

        // ---- Renderizar ----
        function renderProducts(products) {
            loadingSpinner.style.display = 'none';
            productListContainer.innerHTML = '';

            if (products.length === 0) {
                productListContainer.innerHTML = `
                <div class="col-12 text-center text-white py-5">
                    <i class="bi bi-box-seam" style="font-size:3rem;"></i>
                    <p class="mt-2">Nenhum produto encontrado.</p>
                </div>`;
                return;
            }

            products.forEach(product => {
                const isActive = product.active !== false;
                const col = document.createElement('div');
                col.className = 'col-sm-6 col-md-4 col-lg-3';
                col.innerHTML = `
                <div class="card product-card h-100">
                    <img src="${product.imageUrl || 'https://via.placeholder.com/300x200?text=Sem+Imagem'}"
                         class="product-image" alt="${product.name}">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">${product.name}</h5>
                        <p class="card-text text-muted small">${product.description || ''}</p>
                        <p class="card-text fw-bold mt-auto">R$ ${Number(product.price).toFixed(2)}</p>
                        <span class="badge ${isActive ? 'bg-success' : 'bg-secondary'} mb-2">
                            ${isActive ? 'Ativo' : 'Inativo'}
                        </span>
                        <div class="d-flex gap-2">
                            <a href="/lojista/produto/${product.id}/editar" class="btn btn-sm btn-outline-primary flex-fill">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <button class="btn btn-sm btn-outline-secondary toggle-btn"
                                    data-id="${product.id}" data-active="${isActive}">
                                <i class="bi bi-${isActive ? 'eye-slash' : 'eye'}"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger delete-btn" data-id="${product.id}">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
                productListContainer.appendChild(col);
            });

            // Toggle ativo/inativo
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id     = btn.dataset.id;
                    const active = btn.dataset.active === 'true';
                    await fetch(`/api/products/${id}/status?active=${!active}`, { method: 'PATCH' });
                    location.reload();
                });
            });

            // Deletar
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (!confirm('Tem certeza que deseja excluir este produto?')) return;
                    const id = btn.dataset.id;
                    const res = await fetch(`/api/products/${id}?storeId=${storeId}`, { method: 'DELETE' });
                    if (res.ok) location.reload();
                    else alert('Erro ao excluir produto.');
                });
            });
        }

        // ---- Filtros ----
        function applyFilters() {
            const cat    = categoryFilter.value;
            const search = searchInput.value.toLowerCase();
            const filtered = allProducts.filter(p => {
                const matchCat    = cat === 'all' || p.category?.name === cat;
                const matchSearch = p.name.toLowerCase().includes(search);
                return matchCat && matchSearch;
            });
            renderProducts(filtered);
        }

        categoryFilter.addEventListener('change', applyFilters);
        searchInput.addEventListener('input', applyFilters);

        renderProducts(allProducts);
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
