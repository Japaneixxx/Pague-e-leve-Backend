<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  FRAGMENTO: Ilha de navegação inferior do cliente
  Uso: <div th:replace="~{_cartIsland :: island(storeId=${currentStoreId}, activePage='home')}"></div>
  activePage: 'home' | 'produtos' | 'carrinho' | (outro = nenhum destaque)
-->

<div th:fragment="island(storeId, activePage)">

    <style>
        @keyframes islandPop {
            0%   { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.88); }
            70%  { transform: translateX(-50%) translateY(-3px) scale(1.02); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
        }
        @keyframes badgePop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.5); } }
        .island-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.15rem;
            text-decoration: none;
            color: #6c757d;
            font-weight: 500;
            font-size: 0.7rem;
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            min-width: 60px;
            min-height: 52px;
            justify-content: center;
        }
        .island-btn i { font-size: 1.35rem; }
        .island-btn:hover { background: rgba(0,0,0,0.06); color: #1a1a1a; }
        .island-btn--active { color: #029ad5; font-weight: 700; background: rgba(2,154,213,0.12); }
        .island-btn--active:hover { background: rgba(2,154,213,0.18); color: #029ad5; }
        .island-sep { width: 1px; height: 30px; background: rgba(0,0,0,0.1); border-radius: 1px; flex-shrink: 0; }
    </style>

    <div id="cart-island" style="
        position: fixed;
        bottom: 1rem;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255,255,255,0.94);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: 999px;
        padding: 0.3rem 0.75rem;
        box-shadow: 0 4px 28px rgba(0,0,0,0.18);
        display: flex;
        align-items: center;
        gap: 0.15rem;
        z-index: 1050;
        border: 1px solid rgba(255,255,255,0.7);
        justify-content: center;
        animation: islandPop 0.55s cubic-bezier(0.22,1,0.36,1) 0.15s both;
    ">
        <!-- Início -->
        <a id="island-home-btn"
           th:href="@{/{sid}/home(sid=${storeId})}"
           th:class="${activePage == 'home'} ? 'island-btn island-btn--active' : 'island-btn'">
            <i th:class="${activePage == 'home'} ? 'bi bi-house-fill' : 'bi bi-house'"></i>
            <span>Início</span>
        </a>

        <div class="island-sep"></div>

        <!-- Produtos -->
        <a id="island-products-btn"
           th:href="@{/{sid}/produtos(sid=${storeId})}"
           th:class="${activePage == 'produtos'} ? 'island-btn island-btn--active' : 'island-btn'">
            <i th:class="${activePage == 'produtos'} ? 'bi bi-grid-fill' : 'bi bi-grid'"></i>
            <span>Produtos</span>
        </a>

        <div class="island-sep"></div>

        <!-- Carrinho -->
        <a id="island-cart-btn"
           th:href="@{/{sid}/cart(sid=${storeId})}"
           th:class="${activePage == 'carrinho'} ? 'island-btn island-btn--active' : 'island-btn'"
           style="position: relative;">
            <i th:class="${activePage == 'carrinho'} ? 'bi bi-cart3-fill' : 'bi bi-cart3'"></i>
            <span>Carrinho</span>
            <span id="island-cart-badge" style="
                display: none;
                position: absolute;
                top: 2px;
                right: 6px;
                background: #dc3545;
                color: white;
                border-radius: 999px;
                font-size: 0.6rem;
                font-weight: 700;
                min-width: 17px;
                height: 17px;
                line-height: 17px;
                text-align: center;
                padding: 0 3px;
                border: 2px solid white;
            ">0</span>
        </a>
    </div>

    <script th:inline="javascript">
        (function() {
            const storeId = /*[[${storeId}]]*/ null;
            function updateBadge() {
                const badge = document.getElementById('island-cart-badge');
                if (!badge || !storeId) return;
                try {
                    const cart = JSON.parse(sessionStorage.getItem(`cartItems_${storeId}`)) || [];
                    const qty = cart.reduce((s, i) => s + (i.quantity || 1), 0);
                    badge.textContent = qty > 99 ? '99+' : qty;
                    badge.style.display = qty > 0 ? 'block' : 'none';
                    if (qty > 0) { badge.style.animation = 'none'; badge.offsetHeight; badge.style.animation = 'badgePop 0.3s ease'; }
                } catch { badge.style.display = 'none'; }
            }
            document.addEventListener('DOMContentLoaded', updateBadge);
            window.addEventListener('storage', updateBadge);
            window.updateIslandBadge = updateBadge;
        })();
    </script>
</div>

</body>
</html>
