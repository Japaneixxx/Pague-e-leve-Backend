<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#029ad5">
    <title>Pague e Leve - Carrinho</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/reset.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    body {
        display: flex;
        flex-direction: column;
        background-color: #029ad5;
        min-height: 100dvh;

        overflow-x: hidden;
    }

    .page-topbar {
        display: flex;
        align-items: center;
        padding: 0.75rem 1rem 0;
        gap: 0.75rem;
    }
    .btn-back {
        color: white;
        font-size: 1.6rem;
        min-width: 44px;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
    }
    .btn-back:hover { background: rgba(255,255,255,0.15); color: white; }

    .page-title {
        color: white;
        font-size: clamp(1.2rem, 4vw, 1.5rem);
        font-weight: 700;
        margin: 0;
    }

    .cart-section {
        background: white;
        border-radius: 20px 20px 0 0;
        padding: 1rem;
        margin-top: 1rem;
        flex: 1;
    }

    /* Item do carrinho */
    .cart-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.85rem 0;
        border-bottom: 1px solid #f0f0f0;
    }
    .cart-item:last-child { border-bottom: none; }

    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name {
        font-size: 0.95rem;
        font-weight: 600;
        color: #1a1a1a;
        margin: 0 0 0.15rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .cart-item-unit-price {
        font-size: 0.78rem;
        color: #888;
        margin: 0;
    }

    .cart-item-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.4rem;
        flex-shrink: 0;
    }

    .cart-item-subtotal {
        font-size: 0.95rem;
        font-weight: 700;
        color: #198754;
        margin: 0;
    }

    .qty-control {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        background: #f5f5f5;
        border-radius: 8px;
        padding: 0.15rem 0.35rem;
    }
    .qty-btn {
        width: 30px;
        height: 30px;
        border: none;
        background: #e0e0e0;
        border-radius: 6px;
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-user-select: none;
        user-select: none;
    }
    .qty-btn:active { background: #c8c8c8; }
    .qty-value { font-size: 0.95rem; font-weight: 700; min-width: 22px; text-align: center; }

    .btn-remove {
        background: none;
        border: none;
        color: #dc3545;
        font-size: 1.1rem;
        padding: 0.25rem;
        cursor: pointer;
        min-width: 36px;
        min-height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        flex-shrink: 0;
    }
    .btn-remove:active { background: #ffeaea; }

    /* Total e botões de ação */
    .cart-footer {
        padding-top: 1rem;
        border-top: 2px solid #f0f0f0;
        margin-top: 0.5rem;
    }
    .cart-total {
        font-size: 1.25rem;
        font-weight: 800;
        color: #1a1a1a;
        text-align: right;
        margin: 0 0 1rem;
    }
    .cart-total span { color: #198754; }

    .btn-finish {
        width: 100%;
        height: 52px;
        font-size: 1.05rem;
        font-weight: 700;
        border-radius: 14px;
        margin-bottom: 0.6rem;
    }
    .btn-clear {
        width: 100%;
        height: 44px;
        font-size: 0.9rem;
        border-radius: 14px;
    }

    /* Estado vazio */
    .empty-cart {
        text-align: center;
        padding: 3rem 1rem;
        color: #aaa;
    }
    .empty-cart i { font-size: 3.5rem; margin-bottom: 0.75rem; display: block; }
    .empty-cart p { font-size: 1rem; margin: 0; }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp   { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes itemEnter { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes islandPop {
        0%   { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.88); }
        70%  { transform: translateX(-50%) translateY(-3px) scale(1.02); }
        100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }
    .anim-slide-down { animation: slideDown 0.38s cubic-bezier(0.22,1,0.36,1) both; }
    .anim-slide-up   { animation: slideUp   0.42s cubic-bezier(0.22,1,0.36,1) 0.06s both; }
    #cart-island     { animation: islandPop 0.55s cubic-bezier(0.22,1,0.36,1) 0.15s both; }
</style>
<body>

<input type="hidden" id="storeIdData" th:value="${currentStoreId}" />

<div class="page-topbar anim-slide-down">
    <a href="javascript:void(0);" id="backButton" class="btn-back text-decoration-none">
        <i class="bi bi-arrow-left-circle-fill"></i>
    </a>
    <h1 class="page-title">Seu Carrinho</h1>
</div>

<div class="container px-3" style="flex: 1; display: flex; flex-direction: column;">
    <div class="cart-section" style="flex: 1;">
        <div id="cart-items-container">
            <p class="text-center text-muted py-4">Carregando...</p>
        </div>
        <div class="cart-footer" id="cart-footer" style="display: none;">
            <p class="cart-total">Total: <span id="cart-total-value">R$ 0,00</span></p>
            <a class="btn btn-dark btn-finish" id="finish" href="#" role="button">
                <i class="bi bi-lock-fill me-2"></i> Finalizar Compra
            </a>
            <button id="clearCartButton" class="btn btn-outline-danger btn-clear">
                <i class="bi bi-trash me-1"></i> Limpar Carrinho
            </button>
        </div>
    </div>
</div>

<div th:replace="~{_cartIsland :: island(storeId=${currentStoreId}, activePage='carrinho')}"></div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const cartContainer  = document.getElementById('cart-items-container');
        const cartFooter     = document.getElementById('cart-footer');
        const totalValueEl   = document.getElementById('cart-total-value');
        const clearCartBtn   = document.getElementById('clearCartButton');
        const backButton     = document.getElementById('backButton');
        const finishButton   = document.getElementById('finish');
        const currentStoreId = document.getElementById('storeIdData').value;
        const cartKey        = `cartItems_${currentStoreId}`;

        const getCart  = () => JSON.parse(sessionStorage.getItem(cartKey)) || [];
        const saveCart = (c) => sessionStorage.setItem(cartKey, JSON.stringify(c));

        window.updateQty = (id, delta) => {
            let cart = getCart();
            const idx = cart.findIndex(i => i.id == id);
            if (idx === -1) return;
            cart[idx].quantity += delta;
            if (cart[idx].quantity <= 0) cart.splice(idx, 1);
            saveCart(cart);
            renderCart();
            if (window.updateIslandBadge) window.updateIslandBadge();
        };

        window.removeItem = (id) => {
            let cart = getCart().filter(i => i.id != id);
            saveCart(cart);
            renderCart();
            if (window.updateIslandBadge) window.updateIslandBadge();
        };

        function renderCart() {
            const cart = getCart();
            cartContainer.innerHTML = '';

            if (cart.length === 0) {
                cartContainer.innerHTML = `
                    <div class="empty-cart">
                        <i class="bi bi-cart-x"></i>
                        <p>Seu carrinho está vazio.</p>
                    </div>`;
                cartFooter.style.display = 'none';
                return;
            }

            let total = 0;
            cart.forEach((item, idx) => {
                const sub = item.price * item.quantity;
                total += sub;
                const fmt = v => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
                const delay = idx * 0.06;
                cartContainer.insertAdjacentHTML('beforeend', `
                    <div class="cart-item" style="animation: itemEnter 0.35s cubic-bezier(0.22,1,0.36,1) ${delay}s both;">
                        <div class="cart-item-info">
                            <p class="cart-item-name">${item.name}</p>
                            <p class="cart-item-unit-price">${fmt(item.price)} / un</p>
                            <div class="qty-control mt-1">
                                <button class="qty-btn" onclick="window.updateQty('${item.id}', -1)"><i class="bi bi-dash"></i></button>
                                <span class="qty-value">${item.quantity}</span>
                                <button class="qty-btn" onclick="window.updateQty('${item.id}', 1)"><i class="bi bi-plus"></i></button>
                            </div>
                        </div>
                        <div class="cart-item-right">
                            <button class="btn-remove" onclick="window.removeItem('${item.id}')"><i class="bi bi-trash-fill"></i></button>
                            <p class="cart-item-subtotal">${fmt(sub)}</p>
                        </div>
                    </div>`);
            });

            const fmt = v => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
            totalValueEl.textContent = fmt(total);
            finishButton.href = `/${currentStoreId}/checkout?total=${total.toFixed(2)}`;
            cartFooter.style.display = 'block';
        }

        renderCart();

        clearCartBtn.addEventListener('click', () => {
            if (confirm('Limpar todos os itens do carrinho?')) {
                sessionStorage.removeItem(cartKey);
                renderCart();
                if (window.updateIslandBadge) window.updateIslandBadge();
            }
        });

        backButton.addEventListener('click', () => window.history.back());
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
</body>
</html>
