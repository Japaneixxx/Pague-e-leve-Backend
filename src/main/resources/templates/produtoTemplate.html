<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#029ad5">
    <title>Pague e leve</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/reset.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    body {
        background-color: #029ad5;
        min-height: 100dvh;

        overflow-x: hidden;
        display: flex;
        flex-direction: column;
    }

    /* Topo com botão voltar */
    .page-topbar {
        display: flex;
        align-items: center;
        padding: 0.75rem 1rem 0;
    }
    .btn-back {
        color: white;
        font-size: 1.6rem;
        min-width: 44px;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        flex-shrink: 0;
    }
    .btn-back:hover { background: rgba(255,255,255,0.15); color: white; }

    /* Card do produto */
    .product-detail-card {
        background: white;
        border-radius: 20px 20px 0 0;
        min-height: calc(100dvh - 130px);
        padding-bottom: 110px;
        overflow: hidden;
        margin-top: 1rem;
    }

    .product-image {
        width: 100%;
        max-height: 300px;
        object-fit: cover;
    }

    .product-info {
        padding: 1.25rem 1.25rem 1.5rem;
    }

    .product-name {
        font-size: clamp(1.1rem, 4vw, 1.4rem);
        font-weight: 700;
        color: #1a1a1a;
        margin: 0 0 0.4rem;
    }

    .product-description {
        font-size: 0.92rem;
        color: #666;
        margin: 0 0 1rem;
        line-height: 1.5;
    }

    .price-old {
        font-size: 0.9rem;
        color: #dc3545;
        text-decoration: line-through;
        margin: 0 0 0.15rem;
    }

    .price-current {
        font-size: 1.75rem;
        font-weight: 800;
        color: #198754;
        margin: 0 0 1.25rem;
        line-height: 1;
    }

    /* Controles de quantidade e botão */
    .action-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .qty-control {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: #f5f5f5;
        border-radius: 12px;
        padding: 0.25rem 0.5rem;
        flex-shrink: 0;
    }

    .qty-btn {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        border: none;
        background: #e0e0e0;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.15s;
        -webkit-user-select: none;
        user-select: none;
    }
    .qty-btn:active { background: #c8c8c8; }

    .qty-value {
        font-size: 1.1rem;
        font-weight: 700;
        min-width: 28px;
        text-align: center;
        color: #1a1a1a;
    }

    .btn-checkout {
        flex: 1;
        height: 48px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        transition: background 0.15s, transform 0.1s;
    }
    .btn-checkout:active { transform: scale(0.97); }

    .btn-back-text {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        color: white;
        font-size: 0.9rem;
        font-weight: 500;
        padding: 0.4rem 0.75rem;
        border-radius: 20px;
        background: rgba(255,255,255,0.2);
        min-height: 44px;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .btn-back-text:hover { background: rgba(255,255,255,0.3); color: white; }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp   { from { opacity: 0; transform: translateY(32px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp  { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes islandPop {
        0%   { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.88); }
        70%  { transform: translateX(-50%) translateY(-3px) scale(1.02); }
        100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }
    .anim-slide-down { animation: slideDown 0.38s cubic-bezier(0.22,1,0.36,1) both; }
    .anim-slide-up   { animation: slideUp   0.45s cubic-bezier(0.22,1,0.36,1) 0.05s both; }
    .anim-fade-up-1  { animation: fadeInUp  0.38s cubic-bezier(0.22,1,0.36,1) 0.18s both; }
    .anim-fade-up-2  { animation: fadeInUp  0.38s cubic-bezier(0.22,1,0.36,1) 0.26s both; }
    .anim-fade-up-3  { animation: fadeInUp  0.38s cubic-bezier(0.22,1,0.36,1) 0.34s both; }
    #cart-island     { animation: islandPop 0.55s cubic-bezier(0.22,1,0.36,1) 0.2s both; }
</style>
<body>

<!-- Topo -->
<div class="page-topbar anim-slide-down">
    <a href="javascript:void(0);" id="cancelButton" class="btn-back-text text-decoration-none">
        <i class="bi bi-arrow-left"></i> Voltar
    </a>
</div>

<!-- Card do produto -->
<div class="product-detail-card anim-slide-up">
    <img th:src="${product.imageUrl}" th:alt="${product.name}" class="product-image" alt="Produto">

    <div class="product-info">
        <h1 class="product-name anim-fade-up-1" id="productName" th:text="${product.name}">Nome do Produto</h1>
        <p class="product-description anim-fade-up-2" th:text="${product.description}">Descrição do produto.</p>

        <p class="price-old mb-1"
           th:if="${product.oldPrice != null && product.oldPrice > 0}"
           th:text="'R$ ' + ${#numbers.formatDecimal(product.oldPrice, 0, 'POINT', 2, 'COMMA')}"></p>

        <p class="price-current" id="productPrice"
           th:text="'R$ ' + ${#numbers.formatDecimal(product.price, 0, 'POINT', 2, 'COMMA')}">R$ 0,00</p>

        <div class="action-row anim-fade-up-3">
            <!-- Controle de quantidade -->
            <div class="qty-control">
                <button class="qty-btn" id="minus"><i class="bi bi-dash"></i></button>
                <span class="qty-value" id="quantity">1</span>
                <button class="qty-btn" id="plus"><i class="bi bi-plus"></i></button>
            </div>

            <!-- Botão adicionar -->
            <a href="javascript:void(0);" id="checkout" class="btn btn-success btn-checkout"
               th:attr="data-product-id=${product.id},
                        data-product-name=${product.name},
                        data-product-price=${product.price},
                        data-product-store-id=${product.store.id}">
                <i class="bi bi-cart-plus"></i> Adicionar ao Carrinho
            </a>
        </div>
    </div>
</div>

<div th:replace="~{_cartIsland :: island(storeId=${product.store.id}, activePage='nenhum')}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const quantityEl  = document.getElementById('quantity');
        const plusBtn     = document.getElementById('plus');
        const minusBtn    = document.getElementById('minus');
        const cancelBtn   = document.getElementById('cancelButton');
        const checkoutBtn = document.getElementById('checkout');
        let qty = 1;

        plusBtn.addEventListener('click', () => { qty++; quantityEl.textContent = qty; });
        minusBtn.addEventListener('click', () => { if (qty > 1) { qty--; quantityEl.textContent = qty; } });
        cancelBtn.addEventListener('click', () => window.history.back());

        checkoutBtn.addEventListener('click', () => {
            const productId    = checkoutBtn.dataset.productId;
            const productName  = checkoutBtn.dataset.productName;
            const productPrice = parseFloat(checkoutBtn.dataset.productPrice);
            const storeId      = checkoutBtn.dataset.productStoreId;

            if (!productId || !storeId || isNaN(productPrice)) {
                alert('Erro ao ler os dados do produto. Recarregue a página.');
                return;
            }

            const cartKey = `cartItems_${storeId}`;
            let cart = JSON.parse(sessionStorage.getItem(cartKey)) || [];
            const idx = cart.findIndex(i => i.id === productId);
            if (idx > -1) cart[idx].quantity += qty;
            else cart.push({ id: productId, name: productName, price: productPrice, quantity: qty, storeId });
            sessionStorage.setItem(cartKey, JSON.stringify(cart));
            if (window.updateIslandBadge) window.updateIslandBadge();

            // Feedback
            checkoutBtn.innerHTML = '<i class="bi bi-check-lg"></i> Adicionado!';
            checkoutBtn.classList.replace('btn-success', 'btn-secondary');
            setTimeout(() => {
                checkoutBtn.innerHTML = '<i class="bi bi-cart-plus"></i> Adicionar ao Carrinho';
                checkoutBtn.classList.replace('btn-secondary', 'btn-success');
                qty = 1; quantityEl.textContent = qty;
            }, 1500);
        });
    });
</script>
</body>
</html>
