<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pague e leve</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/reset.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>

<style>
    .bg {
        background-color: #029ad5;
    }

    .space5 {
        height: 5vh;
    }

    .space15 {
        height: 10vh;
    }

    .price-old {
        text-decoration: line-through;
        color: #dc3545;
        font-size: 0.95rem;
    }

    .price-current {
        color: #198754;
        font-size: 1.4rem;
        font-weight: 700;
    }
</style>

<body class="bg">

<div class="position-absolute top-50 start-50 translate-middle">
    <div class="card rounded-4" style="width: 20rem; height: auto;">
        <div class="card-header"></div>
        <img th:src="${product.imageUrl}" class="card-img-top" th:alt="${product.name}" alt="...">
        <div class="card-body">
            <h5 class="card-title" id="productName" th:text="${product.name}">Nome Produto</h5>

            <h6 class="card-subtitle mb-2 text-body-secondary" th:text="${product.description}">informações</h6>

            <!-- Preço antigo em vermelho com linha cortada -->
            <p class="price-old mb-1"
               th:if="${product.oldPrice != null && product.oldPrice > 0}"
               th:text="'R$ ' + ${#numbers.formatDecimal(product.oldPrice, 0, 'POINT', 2, 'COMMA')}"></p>

            <!-- Preço atual com destaque -->
            <p class="price-current mb-3" id="productPrice"
               th:text="'R$ ' + ${#numbers.formatDecimal(product.price, 0, 'POINT', 2, 'COMMA')}">Preço</p>

            <a href="javascript:void(0);" id="cancelButton" class="btn btn-light">Voltar</a>
            <span class="px-4"></span>
            <a href="javascript:void(0);" class="btn btn-dark rounded-pill px-1 py-0" id="minus"><i class="bi bi-dash"></i></a>
            <span class="px-1" id="quantity">1</span>
            <a href="javascript:void(0);" class="btn btn-dark rounded-pill px-1 py-0" id="plus"><i class="bi bi-plus"></i></a>
            <span class="px-1"></span>
            <a href="javascript:void(0);" id="checkout" class="btn btn-dark rounded-4 px-3"
               th:attr="data-product-Id=${product.id},
                        data-product-name=${product.name},
                        data-product-price=${product.price},
                        data-product-store-id=${product.store.id}">
                <i class="bi bi-cart-plus"></i>
            </a>
        </div>
    </div>
</div>

<!-- Ilha de navegação inferior -->
<div th:replace="~{_cartIsland :: island(storeId=${product.store.id}, activePage='nenhum')}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
<script th:src="@{/js/produtoTemplate.js}"></script>
</body>
</html>
