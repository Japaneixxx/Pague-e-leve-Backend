<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pague e leve - Produtos da Loja</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>

<style>
    .bg {
        background-color: #029ad5;
    }

    .space5 {
        height: 5vh;
    }

    .space15 {
        height: 10vh;
    }

    .card-img-top-fix {
        width: 100%;
        height: 180px;
        object-fit: cover;
    }

    .product-card {
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .product-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

    .btn-add-cart {
        position: relative;
        z-index: 2; /* garante que o botão fique acima do clique do card */
    }

    /* Toast de confirmação */
    .toast-container {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        z-index: 9999;
    }
</style>

<body class="section bg">

<a type="button" th:href="@{/{storeId}/home(storeId=${currentStoreId})}" id="backButton" class="btn">
    <h1><i class="bi bi-arrow-left-circle-fill"></i></h1>
</a>

<div class="space5"></div>

<div class="text-center">
    <h1 class="fw-bold" th:text="${searchTerm}? 'Resultados da Busca' : 'Produtos'">Produtos</h1>
    <h5 th:if="${searchTerm}" th:text="'Termo: &quot;' + ${searchTerm} + '&quot;'"></h5>
</div>

<div class="space15"></div>

<!-- Toast de confirmação de adição ao carrinho -->
<div class="toast-container">
    <div id="cartToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">
                <i class="bi bi-cart-check-fill me-2"></i>
                <span id="cartToastMessage">Produto adicionado ao carrinho!</span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<div class="container">
    <!-- Filtro por categoria -->
    <div class="d-flex justify-content-center mb-4">
        <div class="w-50">
            <label for="category-select" class="form-label text-white">Filtrar por Categoria</label>
            <select class="form-select" id="category-select">
                <option value="all" selected>Todas as Categorias</option>
            </select>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 bg-light m-1 p-2 rounded-3 overflow-auto">
        <div th:if="${products.empty}" class="col-12">
            <div class="alert alert-info text-center" role="alert">
                Nenhum produto encontrado com este termo nesta loja.
            </div>
        </div>

        <div class="col product-container my-2"
             th:each="product : ${products}"
             th:data-category="${product.category != null ? product.category.name : 'Sem Categoria'}">

            <!-- Card clicável para detalhes (sem <a> envolvendo o botão) -->
            <div class="card h-100 product-card"
                 th:data-product-url="@{/produto/{productId}(productId=${product.id}, storeId=${product.store.id})}">

                <img th:src="${product.imageUrl ?: '/images/placeholder.png'}"
                     class="card-img-top card-img-top-fix"
                     th:alt="${product.name}">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${product.name}">Nome Produto</h5>
                    <p class="card-text text-body-secondary" th:text="${product.description}">informações</p>
                    <h6 class="card-subtitle mb-2"
                        style="text-decoration: line-through; color: #dc3545;"
                        th:if="${product.oldPrice != null && product.oldPrice > 0}"
                        th:text="${'R$ ' + #numbers.formatDecimal(product.oldPrice, 1, 2,'COMMA')}"></h6>
                    <h5 class="fw-bold text-success mt-auto mb-1"
                        th:text="${'R$ ' + #numbers.formatDecimal(product.price, 1, 2,'COMMA')}">R$ 0,00</h5>
                    <p class="card-text text-muted"
                       th:if="${product.category != null}"
                       th:text="${'Categoria: ' + product.category.name}"></p>

                    <!-- Botão Adicionar ao Carrinho -->
                    <button class="btn btn-success mt-3 btn-add-cart"
                            th:data-product-id="${product.id}"
                            th:data-product-name="${product.name}"
                            th:data-product-price="${product.price}"
                            th:data-store-id="${product.store.id}">
                        <i class="bi bi-cart-plus me-1"></i> Adicionar ao Carrinho
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {

        // --- Filtro por categoria ---
        const categorySelect = document.getElementById('category-select');
        const productContainers = document.querySelectorAll('.product-container');

        fetch('/api/categories')
            .then(response => response.json())
            .then(categories => {
                if (!categories) return;
                categories.forEach(categoryName => {
                    const option = document.createElement('option');
                    option.value = categoryName;
                    option.textContent = categoryName;
                    categorySelect.appendChild(option);
                });
            })
            .catch(error => console.error('Erro ao carregar categorias:', error));

        categorySelect.addEventListener('change', () => {
            const selectedCategory = categorySelect.value;
            productContainers.forEach(container => {
                const productCategory = container.dataset.category;
                container.style.display = (selectedCategory === 'all' || productCategory === selectedCategory) ? '' : 'none';
            });
        });

        // --- Toast de confirmação ---
        const toastEl = document.getElementById('cartToast');
        const toastMessage = document.getElementById('cartToastMessage');
        const toast = new bootstrap.Toast(toastEl, { delay: 2500 });

        function showToast(productName) {
            toastMessage.textContent = `"${productName}" adicionado ao carrinho!`;
            toast.show();
        }

        // --- Clique no CARD → vai para detalhes ---
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', (e) => {
                // Se o clique veio do botão, ignora (o botão tem seu próprio listener)
                if (e.target.closest('.btn-add-cart')) return;
                const url = card.dataset.productUrl;
                if (url) window.location.href = url;
            });
        });

        // --- Clique no BOTÃO → adiciona ao carrinho ---
        document.querySelectorAll('.btn-add-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation(); // Impede de disparar o clique do card

                const productId   = btn.dataset.productId;
                const productName = btn.dataset.productName;
                const productPrice = parseFloat(btn.dataset.productPrice);
                const storeId     = btn.dataset.storeId;

                const cartKey = `cartItems_${storeId}`;
                let cart = sessionStorage.getItem(cartKey);
                cart = cart ? JSON.parse(cart) : [];

                const existingIndex = cart.findIndex(item => item.id === productId);
                if (existingIndex > -1) {
                    cart[existingIndex].quantity += 1;
                } else {
                    cart.push({
                        id: productId,
                        name: productName,
                        price: productPrice,
                        quantity: 1,
                        storeId: storeId
                    });
                }

                sessionStorage.setItem(cartKey, JSON.stringify(cart));
                showToast(productName);
                if (window.updateIslandBadge) window.updateIslandBadge();
            });
        });
    });
</script>
<!-- Ilha de navegação inferior -->
<div th:replace="~{_cartIsland :: island(storeId=${currentStoreId}, activePage='produtos')}"></div>

</body>
</html>
